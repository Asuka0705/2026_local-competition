<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>A8</title>
    <link rel="stylesheet" href="a8.css">
</head>
<body>
    <div class="cart-container">
        <header class="cart-header">
            <h1>장바구니</h1>
        </header>

        <section class="cart-list">
            <div class="cart-item">
                <img src="tshirt.jpg" alt="티셔츠" class="item-img">
                <div class="item-info">
                    <h3>WorldSkills 공식 티셔츠</h3>
                    <p>색상: 네이비</p>
                    <p>사이즈: L</p>
                </div>
                <div class="item-controls">
                    <div class="quantity">
                        <button>-</button>
                        <span>2</span>
                        <button>+</button>
                    </div>
                    <span class="price">25,000원</span>
                    <button class="remove-btn">×</button>
                </div>
            </div>

            <div class="cart-item">
                <img src="book.jpg" alt="가이드북" class="item-img">
                <div class="item-info">
                    <h3>기능경기 가이드북</h3>
                    <p>종류: 웹디자인</p>
                    <p>2026년 최신판</p>
                </div>
                <div class="item-controls">
                    <div class="quantity">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                    <span class="price">15,000원</span>
                    <button class="remove-btn">×</button>
                </div>
            </div>

            <div class="cart-item">
                <img src="laptop-case.jpg" alt="파우치" class="item-img">
                <div class="item-info">
                    <h3>WorldSkills 노트북 파우치</h3>
                    <p>색상: 블랙</p>
                    <p>15인치 호환</p>
                </div>
                <div class="item-controls">
                    <div class="quantity">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                    <span class="price">35,000원</span>
                    <button class="remove-btn">×</button>
                </div>
            </div>
        </section>

        <section class="cart-summary">
            <div class="summary-row">
                <span>상품금액</span>
                <span>75,000원</span>
            </div>
            <div class="summary-row">
                <span>배송비</span>
                <span>3,000원</span>
            </div>
            <hr>
            <div class="summary-row total">
                <span>총 결제금액</span>
                <span class="total-price">78,000원</span>
            </div>
        </section>

        <footer class="cart-footer">
            <button class="btn-continue">쇼핑 계속하기</button>
            <button class="btn-order">주문하기</button>
        </footer>
    </div>
</body>
</html>
