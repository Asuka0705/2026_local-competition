<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A13 - 모달 팝업</title>
    <link rel="stylesheet" href="a13.css">
</head>
<body>

    <input type="checkbox" id="modal-toggle">

    <main class="container">
        <label for="modal-toggle" class="login-trigger">로그인</label>
    </main>

    <div class="modal-overlay">
        <section class="modal-content">
            <h2>계정 로그인</h2>
            <p>안전한 서비스를 위해 로그인이 필요합니다.</p>
            <p>계속하려면 아래에 등록된 이메일과 비밀번호를 입력해주세요.</p>
            
            <div class="btn-group">
                <button type="button" class="action-btn continue-btn">로그인 계속</button>
                <label for="modal-toggle" class="close-label">닫기</label>
            </div>
        </section>
    </div>

</body>
</html>
